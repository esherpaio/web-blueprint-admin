{% if error %}
    <div class="alert alert-danger alert-dismissible mb-0 fade show"
         role="alert">
        {{ error }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
{% endif %}
{% if notice %}
    <div class="alert alert-{{ notice.level }} alert-dismissible mb-0 fade show"
         role="alert">
        {{ notice.text }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
{% endif %}
